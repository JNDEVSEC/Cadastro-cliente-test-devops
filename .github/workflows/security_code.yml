name: Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '16 14 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Security Scan (Semgrep + Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # Instala dependências
      # -----------------------------
      - name: Install dependencies
        run: pip install semgrep jq pandas openpyxl

      # -----------------------------
      # Semgrep scan JSON e SARIF
      # -----------------------------
      - name: Run Semgrep (JSON)
        run: semgrep scan --config auto --json --output semgrep.json || true

      - name: Run Semgrep (SARIF)
        run: semgrep scan --config auto --sarif --output semgrep.sarif || true

      - name: Convert JSON to CSV
        run: |
          jq -r '
            ["Rule ID","Severity","File","Line","Message"],
            (.results[]? | [
              .check_id,
              .extra.severity,
              .path,
              .start.line,
              .extra.message
            ])
            | @csv' semgrep.json > semgrep.csv

      - name: Convert CSV to XLSX
        run: |
          python <<EOF
import pandas as pd
df = pd.read_csv("semgrep.csv")
df.to_excel("semgrep.xlsx", index=False)
EOF

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # -----------------------------
      # Trivy scan filesystem (sempre)
      # -----------------------------
      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # -----------------------------
      # Trivy scan Docker (só se houver Dockerfile)
      # -----------------------------
      - name: Check for Dockerfile and scan image
        if: ${{ always() }}
        run: |
          if [ -f Dockerfile ]; then
            echo "Dockerfile found → running Trivy Docker image scan"
            docker build -t my-app-image:${GITHUB_SHA} .
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasecurity/trivy-action:0.20.0 \
              image-ref=my-app-image:${GITHUB_SHA} \
              format=template \
              template=@/contrib/sarif.tpl \
              output=trivy-results-image.sarif \
              severity=CRITICAL,HIGH
          else
            echo "No Dockerfile found → skipping Docker image scan"
          fi

      # -----------------------------
      # Upload Trivy SARIF
      # -----------------------------
      - name: Upload Trivy SARIF (filesystem)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy SARIF (Docker image, if exists)
        if: ${{ steps.check-for-dockerfile-and-scan-image.outcome == 'success' &&  (steps.check-for-dockerfile-and-scan-image.conclusion != 'skipped') }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results-image.sarif'

      # -----------------------------
      # Upload de todos os relatórios como artifact
      # -----------------------------
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            semgrep.json
            semgrep.csv
            semgrep.xlsx
            semgrep.sarif
            trivy-results.sarif
            trivy-results-image.sarif
