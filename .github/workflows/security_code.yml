name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '16 14 * * 2'  # Terças 14:16 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Security Scan (Semgrep + Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # Instalar dependências
      # -----------------------------
      - name: Install dependencies
        run: pip install semgrep jq

      # -----------------------------
      # Semgrep scan JSON + SARIF
      # -----------------------------
      - name: Run Semgrep (JSON)
        run: semgrep scan --config auto --json --output semgrep.json || true

      - name: Run Semgrep (SARIF)
        run: semgrep scan --config auto --sarif --output semgrep.sarif || true

      # -----------------------------
      # Semgrep: gerar CSV (via jq) e JSON achatado
      # -----------------------------
      - name: Convert JSON to CSV (via jq)
        run: |
          jq -r '
            ["Rule ID","Severity","File","Line","Message"],
            (.results[]? | [
              .check_id,
              .extra.severity,
              .path,
              .start.line,
              .extra.message
            ]) | @csv
          ' semgrep.json > semgrep.csv

      - name: Build flat JSON report from Semgrep
        run: |
          jq '{
            results: [
              .results[]? | {
                rule_id: .check_id,
                severity: .extra.severity,
                file: .path,
                line: .start.line,
                message: .extra.message
              }
            ]
          }' semgrep.json > semgrep.report.json

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # -----------------------------
      # Trivy scan filesystem
      # -----------------------------
      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF (filesystem)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      # -----------------------------
      # Upload todos os relatórios como artifact
      # -----------------------------
      - name: Upload all reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            semgrep.json
            semgrep.csv
            semgrep.report.json
            semgrep.sarif
            trivy-results.sarif
