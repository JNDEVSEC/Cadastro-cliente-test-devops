name: Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '16 14 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Security Scan (Semgrep + Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # Instala dependências
      # -----------------------------
      - name: Install dependencies
        run: pip install semgrep jq pandas openpyxl

      # -----------------------------
      # Semgrep scan JSON
      # -----------------------------
      - name: Run Semgrep (JSON)
        run: |
          semgrep scan --config auto --json --output semgrep.json || true

      # Semgrep scan SARIF
      - name: Run Semgrep (SARIF)
        run: |
          semgrep scan --config auto --sarif --output semgrep.sarif || true

      # -----------------------------
      # Converter JSON → CSV
      # -----------------------------
      - name: Convert JSON to CSV
        run: |
          jq -r '
            ["Rule ID","Severity","File","Line","Message"],
            (.results[]? | [
              .check_id,
              .extra.severity,
              .path,
              .start.line,
              .extra.message
            ])
            | @csv' semgrep.json > semgrep.csv

      # -----------------------------
      # Converter CSV → XLSX
      # -----------------------------
      - name: Convert CSV to XLSX
        run: |
          python <<EOF
import pandas as pd
df = pd.read_csv("semgrep.csv")
df.to_excel("semgrep.xlsx", index=False)
EOF

      # -----------------------------
      # Upload Semgrep SARIF
      # -----------------------------
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # -----------------------------
      # Trivy scan (Filesystem - padrão)
      # -----------------------------
      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # -----------------------------
      # Trivy scan Docker (opcional)
      # Para usar, descomente os steps abaixo e ajuste sua imagem
      # -----------------------------
      # - name: Build Docker image (optional)
      #   run: |
      #     docker build -t docker.io/my-organization/my-app:${{ github.sha }} .
      #
      # - name: Run Trivy (Docker image scan)
      #   uses: aquasecurity/trivy-action@7b7aa264d83dc58691451798b4d117d53d21edfe
      #   with:
      #     image-ref: 'docker.io/my-organization/my-app:${{ github.sha }}'
      #     format: 'template'
      #     template: '@/contrib/sarif.tpl'
      #     output: 'trivy-results-image.sarif'
      #     severity: 'CRITICAL,HIGH'

      # -----------------------------
      # Upload Trivy SARIF
      # -----------------------------
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      # -----------------------------
      # Upload de todos os relatórios como artifact
      # -----------------------------
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            semgrep.json
            semgrep.csv
            semgrep.xlsx
            semgrep.sarif
            trivy-results.sarif
            # trivy-results-image.sarif  # descomente se usar Docker scan
