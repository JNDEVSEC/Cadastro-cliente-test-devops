name: Semgrep

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '16 14 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Instala Semgrep
      - name: Install Semgrep
        run: pip install semgrep

      # Executa scan gerando JSON + SARIF
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --json --output semgrep.json \
            --sarif --output semgrep.sarif

      # Converter JSON para CSV
      - name: Convert JSON to CSV
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          jq -r '
            ["Rule ID","Severity","File","Line","Message"],
            (.results[]? | [
              .check_id,
              .extra.severity,
              .path,
              .start.line,
              .extra.message
            ])
            | @csv' semgrep.json > semgrep.csv

      # Converter CSV para Excel (XLSX)
      - name: Convert CSV to XLSX
        run: |
          pip install pandas openpyxl
          python <<EOF
          import pandas as pd
          df = pd.read_csv("semgrep.csv")
          df.to_excel("semgrep.xlsx", index=False)
          EOF

      # Upload SARIF para Code Scanning
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # Upload dos relatórios como artifact
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            semgrep.json
            semgrep.csv
            semgrep.xlsx
