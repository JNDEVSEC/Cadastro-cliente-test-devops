name: Semgrep

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '16 14 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Instala Semgrep e dependências para CSV/XLSX
      - name: Install dependencies
        run: pip install semgrep jq pandas openpyxl

      # Executa Semgrep gerando JSON
      - name: Run Semgrep (JSON)
        run: |
          semgrep scan --config auto --json --output semgrep.json || true

      # Executa Semgrep gerando SARIF
      - name: Run Semgrep (SARIF)
        run: |
          semgrep scan --config auto --sarif --output semgrep.sarif || true

      # Converter JSON para CSV
      - name: Convert JSON to CSV
        run: |
          jq -r '
            ["Rule ID","Severity","File","Line","Message"],
            (.results[]? | [
              .check_id,
              .extra.severity,
              .path,
              .start.line,
              .extra.message
            ])
            | @csv' semgrep.json > semgrep.csv

      # Converter CSV para Excel (XLSX) sem erro de indentação
      - name: Convert CSV to XLSX
        run: |
          python <<EOF
import pandas as pd
df = pd.read_csv("semgrep.csv")
df.to_excel("semgrep.xlsx", index=False)
EOF

      # Upload SARIF para GitHub Security (Code Scanning)
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # Upload dos relatórios como artifact
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: |
            semgrep.json
            semgrep.csv
            semgrep.xlsx
