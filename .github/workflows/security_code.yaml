# generate_report.py
# ---------------------------------------------
# Relatório de Segurança (Semgrep + Trivy)
# Gera security-report.pdf com gráficos de severidade e resumo.
# ---------------------------------------------

import json
import os
from datetime import datetime, timezone

from reportlab.lib import colors
from reportlab.lib.pagesizes import A4
from reportlab.lib.units import cm
from reportlab.pdfgen import canvas

from reportlab.graphics.shapes import Drawing, String
from reportlab.graphics import renderPDF
from reportlab.graphics.charts.piecharts import Pie
from reportlab.graphics.charts.barcharts import VerticalBarChart

# ---------------------------------------------
# Configurações gerais
# ---------------------------------------------
PAGE_WIDTH, PAGE_HEIGHT = A4
MARGIN_L = 2 * cm
MARGIN_R = 2 * cm
MARGIN_T = 2 * cm
MARGIN_B = 2 * cm

TITLE = "Relatório de Segurança"
SUBTITLE = "Semgrep + Trivy"
DATE_STR = datetime.now(timezone.utc).strftime("%d/%m/%Y")

# Ordem fixa para consistência no relatório
SEVERITIES_ORDER = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "INFO"]

# Paleta de cores por severidade
SEVERITY_COLORS = {
    "CRITICAL": colors.Color(0.80, 0.00, 0.00),  # vermelho forte
    "HIGH":     colors.Color(0.95, 0.40, 0.00),  # laranja
    "MEDIUM":   colors.Color(0.98, 0.82, 0.00),  # amarelo
    "LOW":      colors.Color(0.30, 0.65, 0.30),  # verde
    "INFO":     colors.Color(0.55, 0.60, 0.70),  # cinza/azulado
}

# Mapeamento de severidades "soltas" para o nosso conjunto padrão
SEMGREP_SEVERITY_MAP = {
    "CRITICAL": "CRITICAL",
    "ERROR": "HIGH",        # Semgrep pode usar ERROR/WARNING/INFO
    "HIGH": "HIGH",
    "WARNING": "MEDIUM",
    "MEDIUM": "MEDIUM",
    "LOW": "LOW",
    "INFO": "INFO",
    "INFORMATIONAL": "INFO",
}

TRIVY_SEVERITY_MAP = {
    "CRITICAL": "CRITICAL",
    "HIGH": "HIGH",
    "MEDIUM": "MEDIUM",
    "LOW": "LOW",
    "UNKNOWN": "INFO",  # Trivy usa "UNKNOWN": tratamos como INFO
}


# ---------------------------------------------
# Funções utilitárias de leitura/contagem
# ---------------------------------------------
def safe_load_json(path: str):
    """Carrega um JSON com tolerância a arquivo não encontrado ou malformado."""
    if not os.path.exists(path):
        return None
    try:
        with open(path, "r", encoding="utf-8") as f:
            return json.load(f)
    except Exception:
        return None


def init_counts():
    """Cria dicionário de contagem com severidades padrão zeradas."""
    return {k: 0 for k in SEVERITIES_ORDER}


def normalize_severity(value: str, mapping: dict) -> str:
    if not value:
        return "INFO"
    v = str(value).strip().upper()
    return mapping.get(v, "INFO")


def parse_semgrep_counts(semgrep_json_path: str):
    """
    Lê semgrep.json (formato --json) e retorna:
      - counts: dict severidade->qtd
      - total: int (total de achados)
      - results: lista de achados simplificados
    """
    data = safe_load_json(semgrep_json_path)
    counts = init_counts()
    results_out = []

    if not data or "results" not in data:
        return counts, 0, results_out

    for r in data.get("results", []):
        extra = r.get("extra", {})
        sev_raw = extra.get("severity")
        sev = normalize_severity(sev_raw, SEMGREP_SEVERITY_MAP)
        if sev not in counts:
            counts[sev] = 0
        counts[sev] += 1

        results_out.append({
            "rule_id": r.get("check_id"),
            "severity": sev,
            "file": r.get("path"),
            "line": (r.get("start") or {}).get("line"),
            "message": extra.get("message"),
        })

    total = sum(counts.values())
    return counts, total, results_out


def parse_trivy_counts(trivy_json_path: str):
    """
    Lê trivy-results.json e retorna:
      - counts: dict severidade->qtd
      - total: int
    """
    data = safe_load_json(trivy_json_path)
    counts = init_counts()

    if not data:
        return counts, 0

    # Estrutura típica do Trivy: {"Results": [{ "Vulnerabilities": [ ... ] }, ...]}
    results = data.get("Results", [])
    for res in results or []:
        vulns = res.get("Vulnerabilities", [])
        for v in vulns or []:
            sev_raw = v.get("Severity")
            sev = normalize_severity(sev_raw, TRIVY_SEVERITY_MAP)
            if sev not in counts:
                counts[sev] = 0
            counts[sev] += 1

    total = sum(counts.values())
    return counts, total


# ---------------------------------------------
# Funções de desenho (gráficos e layout)
# ---------------------------------------------
def draw_header(c: canvas.Canvas):
    c.setFont("Helvetica-Bold", 20)
    c.drawString(MARGIN_L, PAGE_HEIGHT - MARGIN_T, TITLE)
    c.setFont("Helvetica", 12)
    c.drawString(MARGIN_L, PAGE_HEIGHT - MARGIN_T - 18, SUBTITLE)
    c.drawRightString(PAGE_WIDTH - MARGIN_R, PAGE_HEIGHT - MARGIN_T, f"Data: {DATE_STR}")
