name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '16 14 * * 2'  # terças 14:16 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Security Scan (Semgrep + Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install semgrep reportlab PyPDF2

      # --- SEMGREP ---
      - name: Run Semgrep (JSON)
        run: semgrep scan --config auto --json --output semgrep.json || true

      - name: Run Semgrep (SARIF)
        run: semgrep scan --config auto --sarif --output semgrep.sarif || true

      - name: Convert JSON to CSV
        run: |
          jq -r '
            ["Rule ID","Severity","File","Line","Message"],
            (.results[]? | [
              .check_id,
              .extra.severity,
              .path,
              .start.line,
              .extra.message
            ]) | @csv
          ' semgrep.json > semgrep.csv

      - name: Build flat JSON
        run: |
          jq '{
            results: [
              .results[]? | {
                rule_id: .check_id,
                severity: .extra.severity,
                file: .path,
                line: .start.line,
                message: .extra.message
              }
            ]
          }' semgrep.json > semgrep.report.json

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # --- TRIVY ---
      - name: Run Trivy (filesystem, JSON)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH
          # Se desejar falhar o job caso encontre achados, descomente:
          # exit-code: '1'

      # --- Relatórios PDF ---
      - name: Generate PDF Security Report (Customer)
        run: python sast_scan_customer.py

      - name: Generate PDF Security Report (Corporate)
        run: python generate_report.py

      - name: Upload all reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            semgrep.json
            semgrep.csv
            semgrep.report.json
            semgrep.sarif
            trivy-results.json
            security-report.pdf
            # Caso o script customer gere outro PDF, inclua-o também:
            # security-report-customer.pdf
