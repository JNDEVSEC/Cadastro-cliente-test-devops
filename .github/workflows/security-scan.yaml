name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '16 14 * * 2'  # terças 14:16 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Security Scan (Semgrep + Trivy + Custom)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install semgrep reportlab PyPDF2

      # --- SEMGREP (exclui scripts/) ---
      - name: Run Semgrep (JSON)
        run: semgrep scan --config auto --exclude scripts --json --output semgrep.json || true

      - name: Run Semgrep (SARIF)
        run: semgrep scan --config auto --exclude scripts --sarif --output semgrep.sarif || true

      - name: Convert Semgrep JSON to CSV
        run: |
          jq -r '
            ["Rule ID","Severity","File","Line","Message"],
            (.results[]? | [
              .check_id,
              .extra.severity,
              .path,
              .start.line,
              .extra.message
            ]) | @csv
          ' semgrep.json > semgrep.csv

      - name: Build flat JSON (semgrep.report.json)
        run: |
          jq '{
            results: [
              .results[]? | {
                rule_id: .check_id,
                severity: .extra.severity,
                file: .path,
                line: .start.line,
                message: .extra.message
              }
            ]
          }' semgrep.json > semgrep.report.json

      - name: Upload Semgrep SARIF
        if: ${{ hashFiles('semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # --- TRIVY: Image (somente se houver Dockerfile) ---
      - name: Build Docker image
        if: ${{ hashFiles('Dockerfile') != '' }}
        run: |
          docker build -t local/test-insecure:${{ github.sha }} .

      - name: Trivy Image scan (SARIF)
        if: ${{ hashFiles('Dockerfile') != '' }}
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/test-insecure:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy Image SARIF (artifact)
        if: ${{ hashFiles('trivy-image.sarif') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif
          if-no-files-found: ignore

      - name: Upload Trivy Image SARIF to Code Scanning
        if: ${{ hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
        continue-on-error: true

      # --- TRIVY: FS (cria .trivyignore para ignorar scripts/) ---
      - name: Create .trivyignore (ignore scripts/)
        run: |
          echo "scripts/" >> .trivyignore

      - name: Trivy FS scan (repo -> SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy FS SARIF
        if: ${{ hashFiles('trivy-fs.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
        continue-on-error: true

      # =========================
      # CUSTOM SECURITY REVIEW (exclui scripts/)
      # =========================
      - name: Run custom security review (FS)
        run: |
          python ./scripts/security_review.py \
            --root . \
            --json-out custom-review.json \
            --sarif-out custom-review.sarif \
            --csv-out custom-review.csv \
            --exclude-dirs ".git,.hg,.svn,.tox,.mypy_cache,.pytest_cache,node_modules,dist,build,out,.venv,venv,__pycache__,.next,.nuxt,.yarn,.pnpm-store,coverage,scripts"

      - name: Upload Custom Review SARIF
        if: ${{ hashFiles('custom-review.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: custom-review.sarif

      - name: Upload Custom Review JSON/CSV
        uses: actions/upload-artifact@v4
        with:
          name: custom-review
          path: |
            custom-review.json
            custom-review.csv
          if-no-files-found: ignore

      # --- Relatório PDF (tópicos; Semgrep + Trivy Image/FS + Custom) ---
      - name: Generate PDF Security Report (Corporate)
        run: python ./scripts/generate_report.py

      - name: Upload all reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            semgrep.json
            semgrep.csv
            semgrep.report.json
            semgrep.sarif
            trivy-image.sarif
            trivy-fs.sarif
            custom-review.json
            custom-review.sarif
            custom-review.csv
            security-report.pdf
          if-no-files-found: ignore
