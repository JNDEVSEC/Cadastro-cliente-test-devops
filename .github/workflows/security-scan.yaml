name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '16 14 * * 2'

permissions:
  contents: write
  security-events: write

jobs:
# ======================================================
# SCAN — NUNCA FALHA
# ======================================================
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install semgrep PyPDF2 reportlab jq || true

      # -------------------------
      # SEMGREP
      # -------------------------
      - name: Semgrep JSON
        run: semgrep scan --config auto --json --output semgrep.json || true

      - name: Semgrep SARIF
        run: semgrep scan --config auto --sarif --output semgrep.sarif || true

      - name: Upload Semgrep SARIF
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # -------------------------
      # TRIVY
      # -------------------------
      - name: Trivy FS
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          output: trivy.json
          format: json

      # -------------------------
      # CUSTOM REVIEW (LOCAL)
      # -------------------------
      - name: Custom Security Review
        run: |
          python scripts/security_review.py \
            --root . \
            --json-out custom-review.json \
            --sarif-out custom-review.sarif || true

      - name: Upload Custom Review SARIF
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: custom-review.sarif

      # -------------------------
      # JOB SUMMARY
      # -------------------------
      - name: Security Summary
        run: |
          HIGH=$(jq '[.results[]? | select(.severity=="HIGH")] | length' custom-review.json 2>/dev/null || echo 0)
          MEDIUM=$(jq '[.results[]? | select(.severity=="MEDIUM")] | length' custom-review.json 2>/dev/null || echo 0)
          LOW=$(jq '[.results[]? | select(.severity=="LOW")] | length' custom-review.json 2>/dev/null || echo 0)

          echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 HIGH | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 MEDIUM | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟢 LOW | $LOW |" >> $GITHUB_STEP_SUMMARY

      # -------------------------
      # BADGE (RISK)
      # -------------------------
      - name: Generate Risk Badge
        run: |
          HIGH=$(jq '[.results[]? | select(.severity=="HIGH")] | length' custom-review.json 2>/dev/null || echo 0)
          if [ "$HIGH" -gt 0 ]; then
            echo "HIGH 🔴" > security-risk.txt
          else
            echo "LOW 🟢" > security-risk.txt
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: |
            semgrep.json
            semgrep.sarif
            trivy.json
            custom-review.json
            custom-review.sarif
            security-risk.txt

# ======================================================
# POLICY GATE — SÓ QUEBRA NA MAIN
# ======================================================
  policy-gate:
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download security results
        uses: actions/download-artifact@v4
        with:
          name: security-results

      - name: Enforce Security Policy
        run: |
          HIGH=$(jq '[.results[]? | select(.severity=="HIGH")] | length' custom-review.json || echo 0)
          echo "HIGH findings: $HIGH"

          if [ "$HIGH" -gt 0 ]; then
            echo "❌ Security policy violated"
            exit 1
          fi

          echo "✅ Security policy passed"
