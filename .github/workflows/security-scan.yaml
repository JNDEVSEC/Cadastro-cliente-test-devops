name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
# ======================================================
# SCAN (NUNCA FALHA)
# ======================================================
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          pip install semgrep python-dotenv

      # ---------------- SEMGREP ----------------
      - name: Run Semgrep (JSON)
        run: semgrep scan --config auto --json --output semgrep.json || true

      - name: Run Semgrep (SARIF)
        run: semgrep scan --config auto --sarif --output semgrep.sarif || true

      - name: Upload Semgrep SARIF
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # ---------------- TRIVY ----------------
      - name: Run Trivy SCA
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy.json

      # ---------------- CUSTOM REVIEW ----------------
      - name: Run security_review.py
        run: |
          python scripts/security_review.py \
            --root . \
            --json-out custom-review.json \
            --sarif-out custom-review.sarif || true

      - name: Upload Custom Review SARIF
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: custom-review.sarif

      # ---------------- IA (ADVISORY ONLY) ----------------
      - name: Generate AI corrections (advisory)
        run: python scripts/correcaosca.py || true

      - name: Upload NVD correction report
        uses: actions/upload-artifact@v4
        with:
          name: security-nvd-corrections
          path: relatorio_correcoes_nvd_*.json
          if-no-files-found: ignore      

      # ---------------- SUMMARY ----------------
      - name: Scan Summary (Security + AI)
        run: |
          echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TRIVY_HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' trivy.json)
          SEMGREP_HIGH=$(jq '[.results[]? | select(.extra.severity=="HIGH" or .extra.severity=="CRITICAL")] | length' semgrep.json)
          CUSTOM_HIGH=$(jq '[.results[]? | select(.severity=="HIGH" or .severity=="CRITICAL")] | length' custom-review.json)

          echo "| Fonte | HIGH / CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | $TRIVY_HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep | $SEMGREP_HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| Custom Review | $CUSTOM_HIGH |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Job summary generated at run-time_" >> $GITHUB_STEP_SUMMARY

          if ls Relatorio_Correcoes_SCA_*.txt 1> /dev/null 2>&1; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🤖 AI Remediation Summary (Advisory)" >> $GITHUB_STEP_SUMMARY
            echo "_Sugestões de correção por IA. Não influenciam o security gate._" >> $GITHUB_STEP_SUMMARY

            for f in Relatorio_Correcoes_SCA_*.txt; do
              echo "### $f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              sed -n '1,60p' "$f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            done
          fi

          
      - name: NVD Fix Version Summary
        run: |
          if ls relatorio_correcoes_nvd_*.json 1> /dev/null 2>&1; then
            echo "## 🛠️ NVD – Versões não vulneráveis" >> $GITHUB_STEP_SUMMARY
            jq -r '.[] | "- **\(.Componente)** CVE \(.CVE) → ✅ Corrigir para **\(.Versao_Segura)**"' relatorio_correcoes_nvd_*.json >> $GITHUB_STEP_SUMMARY
          fi
      
      
            # ---------------- ARTEFATOS PARA O GATE ----------------
            - uses: actions/upload-artifact@v4
              with:
                name: security-results
                path: |
                  trivy.json
                  semgrep.json
                  custom-review.json

# ======================================================
# SECURITY GATE (QUEBRA POR HIGH / CRITICAL)
# ======================================================
  policy-gate:
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: security-results

      - name: Enforce security policy
        run: |
          TRIVY=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' trivy.json)
          SEMGREP=$(jq '[.results[]? | select(.extra.severity=="HIGH" or .extra.severity=="CRITICAL")] | length' semgrep.json)
          CUSTOM=$(jq '[.results[]? | select(.severity=="HIGH" or .severity=="CRITICAL")] | length' custom-review.json)

          TOTAL=$((TRIVY + SEMGREP + CUSTOM))

          echo "HIGH/CRITICAL TOTAL: $TOTAL"

          if [ "$TOTAL" -gt 0 ]; then
            echo "❌ Security gate failed"
            exit 1
          fi

          echo "✅ Security gate passed"
