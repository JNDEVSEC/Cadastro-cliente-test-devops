name: Security Scan

on:
  workflow_call:
    inputs:
      project-path:
        required: false
        default: '.'
        type: string

  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

  schedule:
    - cron: '16 14 * * 2'

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest

    # ✅ Node 24 para todas as JS Actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: ${{ inputs.project-path || '.' }}
        shell: bash

    steps:
      # =========================
      # CHECKOUT DO PRÓPRIO REPO
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # PYTHON
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # =========================
      # SYSTEM DEPS
      # =========================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # PYTHON DEPS
      # =========================
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install reportlab PyPDF2 semgrep

      # =========================
      # SEMGREP
      # =========================
      - name: Run Semgrep (JSON)
        run: semgrep scan --config auto --json --output semgrep.json || true

      - name: Run Semgrep (SARIF)
        run: semgrep scan --config auto --sarif --output semgrep.sarif || true

      - name: Convert Semgrep JSON to CSV
        run: |
          jq -r '
            ["Rule ID","Severity","File","Line","Message"],
            (.results[]? | [
              .check_id,
              .extra.severity,
              .path,
              .start.line,
              .extra.message
            ]) | @csv
          ' semgrep.json > semgrep.csv

      - name: Build flattened Semgrep JSON
        run: |
          jq '{
            results: [
              .results[]? | {
                rule_id: .check_id,
                severity: .extra.severity,
                file: .path,
                line: .start.line,
                message: .extra.message
              }
            ]
          }' semgrep.json > semgrep.report.json

      - name: Upload Semgrep SARIF
        if: ${{ hashFiles('semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # =========================
      # TRIVY
      # =========================
      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: '.'
          format: json
          output: trivy-results.json
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
        env:
          TRIVY_SCANNERS: 'vuln,secret,misconfig'

      # =========================
      # CUSTOM SECURITY REVIEW (LOCAL)
      # =========================
      - name: Run custom security review (local scripts)
        run: |
          python scripts/security_review.py \
            --root . \
            --json-out custom-review.json \
            --sarif-out custom-review.sarif \
  
           # --fail-on HIGH

      - name: Upload Custom Review SARIF
        if: ${{ hashFiles('custom-review.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: custom-review.sarif

      # =========================
      # PDF REPORT (LOCAL)
      # =========================
      - name: Generate PDF security report
        run: python scripts/generate_report.py

      # =========================
      # ARTEFATOS
      # =========================
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: scripts/security-reports
          path: |
            semgrep.json
            semgrep.csv
            semgrep.report.json
            semgrep.sarif
            trivy-results.json
            custom-review.json
            custom-review.sarif
            security-report.pdf
          if-no-files-found: ignore
