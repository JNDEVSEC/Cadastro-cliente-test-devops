name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '16 14 * * 2'  # terças 14:16 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Security Scan (Semgrep + Trivy + Custom)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # matplotlib requerido pelo generate_report.py (gráficos)
          pip install semgrep reportlab PyPDF2 matplotlib

      # --- SEMGREP (exclui scripts/) ---
      - name: Run Semgrep (JSON)
        run: semgrep scan --config auto --exclude scripts --json --output semgrep.json || true

      - name: Run Semgrep (SARIF)
        run: semgrep scan --config auto --exclude scripts --sarif --output semgrep.sarif || true

      - name: Convert Semgrep JSON to CSV
        run: |
          jq -r '
            ["Rule ID","Severity","File","Line","Message"],
            (.results[]? | [
              .check_id,
              .extra.severity,
              .path,
              .start.line,
              .extra.message
            ]) | @csv
          ' semgrep.json > semgrep.csv

      - name: Build flat JSON (semgrep.report.json)
        run: |
          jq '{
            results: [
              .results[]? | {
                rule_id: .check_id,
                severity: .extra.severity,
                file: .path,
                line: .start.line,
                message: .extra.message
              }
            ]
          }' semgrep.json > semgrep.report.json

      - name: Upload Semgrep SARIF
        if: ${{ hashFiles('semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: sast-semgrep

      # --- TRIVY: Detecta Dockerfile e faz build (best-effort) ---
      - name: Detect Dockerfile path
        id: dfile
        shell: bash
        run: |
          FILE=$(git ls-files | grep -E '(^|/)[Dd]ockerfile([.-].*)?$' | head -n 1 || true)
          if [ -n "$FILE" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$FILE" >> "$GITHUB_OUTPUT"
            echo "Found Dockerfile at: $FILE"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "No Dockerfile found"
          fi

      - name: Build Docker image (best-effort)
        if: ${{ steps.dfile.outputs.found == 'true' }}
        id: buildimg
        shell: bash
        continue-on-error: true
        run: |
          if docker build -f "${{ steps.dfile.outputs.path }}" -t local/test-insecure:${{ github.sha }} .; then
            echo "succeeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "Build falhou, continuando pipeline (scan de imagem será pulado)."
            echo "succeeded=false" >> "$GITHUB_OUTPUT"
          fi

     # --- TRIVY: Image (só se o build suceder) ---
      - name: Trivy Image scan (SARIF)
        if: ${{ steps.dfile.outputs.found == 'true' && steps.buildimg.outputs.succeeded == 'true' }}
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/test-insecure:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          # inclui UNKNOWN para não perder findings com severidade desconhecida
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true
      
      - name: Upload Trivy Image SARIF (artifact)
        if: ${{ hashFiles('trivy-image.sarif') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif
          if-no-files-found: ignore
      
      - name: Upload Trivy Image SARIF to Code Scanning
        if: ${{ hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: sca-trivy-image
        continue-on-error: true
      
      # --- TRIVY: FS (ignora scripts/ via .trivyignore) ---
      - name: Create .trivyignore (ignore scripts/)
        run: |
          echo "scripts/" >> .trivyignore
      
      - name: Trivy FS scan (repo -> SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'  # inclui UNKNOWN
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true
      
      - name: Upload Trivy FS SARIF
        if: ${{ hashFiles('trivy-fs.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: sca-trivy-fs
        continue-on-error: true

      # --- TRIVY: Config (IaC: Dockerfile/Compose) ---
      - name: Trivy Config scan (Dockerfile/IaC -> SARIF)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config.sarif'
          ignore-unfixed: true
          exit-code: '0'
          scanners: 'config,secret'
        continue-on-error: true

      - name: Upload Trivy Config SARIF
        if: ${{ hashFiles('trivy-config.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: iac-trivy-config
        continue-on-error: true

      # =========================
      # CUSTOM SECURITY REVIEW (exclui scripts/)
      # =========================
      - name: Run custom security review (FS)
        run: |
          python ./scripts/security_review.py \
            --root . \
            --json-out custom-review.json \
            --sarif-out custom-review.sarif \
            --csv-out custom-review.csv \
            --exclude-dirs ".git,.hg,.svn,.tox,.mypy_cache,.pytest_cache,node_modules,dist,build,out,.venv,venv,__pycache__,.next,.nuxt,.yarn,.pnpm-store,coverage,scripts"

      - name: Upload Custom Review SARIF
        if: ${{ hashFiles('custom-review.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: custom-review.sarif
          category: sast-custom

      - name: Upload Custom Review JSON/CSV
        uses: actions/upload-artifact@v4
        with:
          name: custom-review
          path: |
            custom-review.json
            custom-review.csv
          if-no-files-found: ignore

      # --- Relatório PDF (corporate) ---
      - name: Generate PDF Security Report (Corporate)
        # opcional: personalize sua marca via env
        # env:
        #   COMPANY_NAME: "Sua Empresa S.A."
        #   REPORT_TITLE: "Relatório de Segurança — CI/CD"
        #   LOGO_PATH: "./assets/logo.png"
        run: python ./scripts/generate_report.py

      - name: Upload all reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            semgrep.json
            semgrep.csv
            semgrep.report.json
            semgrep.sarif
            trivy-image.sarif
            trivy-fs.sarif
            trivy-config.sarif
            custom-review.json
            custom-review.sarif
            custom-review.csv
            security-report.pdf
          if-no-files-found: ignore
