name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch

permissions:
  contents: write
  security-events: write

jobs:
# ======================================================
# SCAN (scan + summary + IA advisory)
# ======================================================
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install python-dotenv

      # ---------------- TRIVY ----------------
      - name: Trivy SCA
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy.json

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: trivy.json

      # ---------------- IA ADVISORY ----------------
      - name: Generate AI corrections (advisory)
        run: python scripts/correcaosca.py || true

      - name: Upload AI correction reports
        uses: actions/upload-artifact@v4
        with:
          name: security-ai-corrections
          path: Relatorio_Correcoes_SCA_*.txt
          if-no-files-found: ignore

      # ---------------- SUMMARY ----------------
      - name: Scan Summary (Security + AI)
        run: |
          echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)
          MEDIUM=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy.json)
          LOW=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy.json)

          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 HIGH | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 MEDIUM | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
          echo "| 🟢 LOW | $LOW |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Job summary generated at run-time_" >> $GITHUB_STEP_SUMMARY

          if ls Relatorio_Correcoes_SCA_*.txt 1> /dev/null 2>&1; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## 🤖 AI Remediation Summary (Advisory)" >> $GITHUB_STEP_SUMMARY
            echo "_Sugestões de correção geradas por IA. Não influenciam o security gate._" >> $GITHUB_STEP_SUMMARY

            for f in Relatorio_Correcoes_SCA_*.txt; do
              echo "### 📄 $f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              sed -n '1,60p' "$f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            done
          fi

# ======================================================
# SECURITY GATE (SOMENTE SCAN)
# ======================================================
  policy-gate:
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download scan results
        uses: actions/download-artifact@v4
        with:
          name: security-results

      - name: Enforce security policy
        run: |
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' trivy.json)

          if [ "$HIGH" -gt 0 ]; then
            echo "Security gate failed"
            exit 1
          fi

          echo "Security gate passed"
