name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

# ── Atualize estes dois valores quando o ngrok reiniciar ─────────────
env:
  NGROK_URL:   "https://sauciness-ovary-clanking.ngrok-free.app"
  WEBHOOK_KEY: "acc6d4051fb7fd2f731a6a3283bb5b108fec5a3180c4606764b8cc358f93273902ebaf93e6de0290b9f6d1ffeba42c65a3f4d52570cf0e20988250a1ded64891"

jobs:
# ======================================================
# SCAN (NUNCA FALHA)
# ======================================================
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install semgrep python-dotenv

      # ---------------- SEMGREP ----------------
      - name: Run Semgrep (JSON)
        run: semgrep scan --config auto --json --output semgrep.json || true

      - name: Run Semgrep (SARIF)
        run: semgrep scan --config auto --sarif --output semgrep.sarif || true

      - name: Upload Semgrep SARIF
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      # ---------------- TRIVY ----------------
      - name: Run Trivy SCA
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy.json

      # ---------------- CUSTOM REVIEW ----------------
      - name: Run security_review.py
        run: |
          python scripts/security_review.py \
            --root . \
            --json-out custom-review.json \
            --sarif-out custom-review.sarif || true

      - name: Upload Custom Review SARIF
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: custom-review.sarif

      # ---------------- IA (ADVISORY ONLY) ----------------
      - name: Generate AI corrections (advisory)
        run: python scripts/correcaosca.py || true

      - name: Upload NVD correction report
        uses: actions/upload-artifact@v4
        with:
          name: security-nvd-corrections
          path: relatorio_correcoes_nvd_*.json
          if-no-files-found: ignore

      # ---------------- NVD SUMMARY ----------------
      - name: NVD Remediation Summary (Advisory)
        shell: bash
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## 🛠️ NVD Remediation Summary (Advisory)" >> "$GITHUB_STEP_SUMMARY"
          echo "Correções oficiais baseadas na NVD (NIST)." >> "$GITHUB_STEP_SUMMARY"
          echo "_Estas informações não influenciam o security gate._" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if ls relatorio_correcoes_nvd_*.json 1> /dev/null 2>&1; then
            jq -c '.[]' relatorio_correcoes_nvd_*.json | while read -r item; do
              CVE=$(echo "$item" | jq -r '.CVE')
              COMP=$(echo "$item" | jq -r '.Componente')
              INST=$(echo "$item" | jq -r '.Versao_Instalada')
              FIX=$(echo "$item" | jq -r '.Versao_Segura')
              echo "**🔐 CVE:** $CVE" >> "$GITHUB_STEP_SUMMARY"
              echo "**📦 Componente:** $COMP" >> "$GITHUB_STEP_SUMMARY"
              echo "**📌 Versão instalada:** $INST" >> "$GITHUB_STEP_SUMMARY"
              echo "**✅ Versão não vulnerável:** $FIX" >> "$GITHUB_STEP_SUMMARY"
              echo "---" >> "$GITHUB_STEP_SUMMARY"
            done
          else
            echo "_Nenhuma correção baseada na NVD foi gerada nesta execução._" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ---------------- ENVIA PARA A PLATAFORMA ----------------
      # ngrok-skip-browser-warning: bypassa a página de aviso do ngrok gratuito

       - name: Ingest Trivy → Plataforma
        if: always()
        run: |
          jq -n \
            --arg projeto "${{ github.repository }}" \
            --arg run_id  "${{ github.run_id }}" \
            --slurpfile data trivy.json \
            '{projeto_nome:$projeto,fonte:"trivy",pipeline_run_id:$run_id,auto_close:true,data:$data[0]}' \
            > _payload_trivy.json
 
          HTTP=$(curl -s -o _resp_trivy.json -w "%{http_code}" \
            -X POST "https://sauciness-ovary-clanking.ngrok-free.app/api/webhook/ingest/" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: acc6d4051fb7fd2f731a6a3283bb5b108fec5a3180c4606764b8cc358f93273902ebaf93e6de0290b9f6d1ffeba42c65a3f4d52570cf0e20988250a1ded64891" \
            -H "ngrok-skip-browser-warning: true" \
            --data @_payload_trivy.json)
 
          echo "HTTP Status: $HTTP"
          cat _resp_trivy.json
 
          if [ "$HTTP" = "200" ]; then
            echo "✅ Trivy OK — criados: $(jq -r '.criados//0' _resp_trivy.json) | reabertos: $(jq -r '.reabertos//0' _resp_trivy.json) | auto_fechados: $(jq -r '.auto_fechados//0' _resp_trivy.json)"
          else
            echo "⚠️ Trivy ingest falhou com HTTP $HTTP (não bloqueia o pipeline)"
          fi
 
      - name: Ingest Semgrep → Plataforma
        if: always()
        run: |
          jq -n \
            --arg projeto "${{ github.repository }}" \
            --arg run_id  "${{ github.run_id }}" \
            --slurpfile data semgrep.json \
            '{projeto_nome:$projeto,fonte:"semgrep",pipeline_run_id:$run_id,auto_close:true,data:$data[0]}' \
            > _payload_semgrep.json
 
          HTTP=$(curl -s -o _resp_semgrep.json -w "%{http_code}" \
            -X POST "https://sauciness-ovary-clanking.ngrok-free.app/api/webhook/ingest/" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: acc6d4051fb7fd2f731a6a3283bb5b108fec5a3180c4606764b8cc358f93273902ebaf93e6de0290b9f6d1ffeba42c65a3f4d52570cf0e20988250a1ded64891" \
            -H "ngrok-skip-browser-warning: true" \
            --data @_payload_semgrep.json)
 
          echo "HTTP Status: $HTTP"
          cat _resp_semgrep.json
 
          if [ "$HTTP" = "200" ]; then
            echo "✅ Semgrep OK — criados: $(jq -r '.criados//0' _resp_semgrep.json) | reabertos: $(jq -r '.reabertos//0' _resp_semgrep.json) | auto_fechados: $(jq -r '.auto_fechados//0' _resp_semgrep.json)"
          else
            echo "⚠️ Semgrep ingest falhou com HTTP $HTTP (não bloqueia o pipeline)"
          fi
 
      - name: Ingest Custom Review → Plataforma
        if: always()
        run: |
          jq -n \
            --arg projeto "${{ github.repository }}" \
            --arg run_id  "${{ github.run_id }}" \
            --slurpfile data custom-review.json \
            '{projeto_nome:$projeto,fonte:"custom",pipeline_run_id:$run_id,auto_close:true,data:$data[0]}' \
            > _payload_custom.json
 
          HTTP=$(curl -s -o _resp_custom.json -w "%{http_code}" \
            -X POST "https://sauciness-ovary-clanking.ngrok-free.app/api/webhook/ingest/" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: acc6d4051fb7fd2f731a6a3283bb5b108fec5a3180c4606764b8cc358f93273902ebaf93e6de0290b9f6d1ffeba42c65a3f4d52570cf0e20988250a1ded64891" \
            -H "ngrok-skip-browser-warning: true" \
            --data @_payload_custom.json)
 
          echo "HTTP Status: $HTTP"
          cat _resp_custom.json
 
          if [ "$HTTP" = "200" ]; then
            echo "✅ Custom OK — criados: $(jq -r '.criados//0' _resp_custom.json) | reabertos: $(jq -r '.reabertos//0' _resp_custom.json) | auto_fechados: $(jq -r '.auto_fechados//0' _resp_custom.json)"
          else
            echo "⚠️ Custom ingest falhou com HTTP $HTTP (não bloqueia o pipeline)"
          fi

      - name: Ingest Semgrep → Plataforma
        if: always()
        run: |
          RESP=$(curl -sf -X POST "${{ env.NGROK_URL }}/api/webhook/ingest/" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ env.WEBHOOK_KEY }}" \
            -H "ngrok-skip-browser-warning: true" \
            -d "{
              \"projeto_nome\": \"${{ github.repository }}\",
              \"fonte\": \"semgrep\",
              \"pipeline_run_id\": \"${{ github.run_id }}\",
              \"auto_close\": true,
              \"data\": $(cat semgrep.json)
            }")
          if [ $? -eq 0 ]; then
            echo "✅ Semgrep ingest OK — criados: $(echo $RESP | jq -r '.criados // 0') | reabertos: $(echo $RESP | jq -r '.reabertos // 0') | auto_fechados: $(echo $RESP | jq -r '.auto_fechados // 0')"
          else
            echo "⚠️ Semgrep ingest falhou (não bloqueia o pipeline)"
          fi

      - name: Ingest Custom Review → Plataforma
        if: always()
        run: |
          RESP=$(curl -sf -X POST "${{ env.NGROK_URL }}/api/webhook/ingest/" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ env.WEBHOOK_KEY }}" \
            -H "ngrok-skip-browser-warning: true" \
            -d "{
              \"projeto_nome\": \"${{ github.repository }}\",
              \"fonte\": \"custom\",
              \"pipeline_run_id\": \"${{ github.run_id }}\",
              \"auto_close\": true,
              \"data\": $(cat custom-review.json)
            }")
          if [ $? -eq 0 ]; then
            echo "✅ Custom ingest OK — criados: $(echo $RESP | jq -r '.criados // 0') | reabertos: $(echo $RESP | jq -r '.reabertos // 0') | auto_fechados: $(echo $RESP | jq -r '.auto_fechados // 0')"
          else
            echo "⚠️ Custom ingest falhou (não bloqueia o pipeline)"
          fi

      # ---------------- ARTEFATOS PARA O GATE ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: security-results
          path: |
            trivy.json
            semgrep.json
            custom-review.json

# ======================================================
# SECURITY GATE — consulta a plataforma
# ======================================================
  policy-gate:
    runs-on: ubuntu-latest
    needs: scan
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: security-results

      - name: Enforce security policy via Plataforma
        env:
          NGROK_URL:   "https://sauciness-ovary-clanking.ngrok-free.app"
          WEBHOOK_KEY: "acc6d4051fb7fd2f731a6a3283bb5b108fec5a3180c4606764b8cc358f93273902ebaf93e6de0290b9f6d1ffeba42c65a3f4d52570cf0e20988250a1ded64891"
        run: |
          echo "## 🔒 Security Gate Report" >> "$GITHUB_STEP_SUMMARY"
          echo "**Pipeline:** \`${{ github.run_id }}\` | **Commit:** \`${{ github.sha }}\` | **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          GATE_RESPONSE=$(curl -sf \
            -H "X-API-Key: $WEBHOOK_KEY" \
            -H "ngrok-skip-browser-warning: true" \
            "$NGROK_URL/api/gate-check/?projeto=${{ github.repository }}&fonte=trivy,semgrep,custom" \
          ) || GATE_RESPONSE=""

          if [ -n "$GATE_RESPONSE" ]; then
            BLOQUEANTES=$(echo "$GATE_RESPONSE" | jq -r '.bloqueantes // 0')
            CRITICAL=$(echo "$GATE_RESPONSE"    | jq -r '.critical // 0')
            HIGH=$(echo "$GATE_RESPONSE"        | jq -r '.high // 0')
            GATE_STATUS=$(echo "$GATE_RESPONSE" | jq -r '.gate_status // "UNKNOWN"')

            echo "### 📊 Resultado da Plataforma" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [ "$BLOQUEANTES" -gt 0 ]; then
              echo "### 📦 Vulnerabilidades bloqueantes (HIGH/CRITICAL abertos)" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "| Sev. | CVE / Título | Componente | Versão atual | Versão corrige | Criado em | Última vez visto |" >> "$GITHUB_STEP_SUMMARY"
              echo "|:---:|---|---|:---:|:---:|:---:|:---:|" >> "$GITHUB_STEP_SUMMARY"

              echo "$GATE_RESPONSE" | jq -r '
                .findings[]
                | [
                    (if .severidade=="CRITICAL" then "🔴 CRITICAL" else "🟠 HIGH" end),
                    (.titulo // "N/A"),
                    (.componente // "N/A"),
                    (.versao_instalada // "N/A"),
                    (if (.versao_corrige // "") != "" then .versao_corrige else "⚠️ sem fix" end),
                    (.criado_em // "N/A"),
                    (.atualizado_em // "N/A")
                  ]
                | "| " + join(" | ") + " |"
              ' >> "$GITHUB_STEP_SUMMARY"

              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "---" >> "$GITHUB_STEP_SUMMARY"
            echo "| Métrica | Valor |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|:---:|" >> "$GITHUB_STEP_SUMMARY"
            echo "| 🔴 Critical bloqueantes | $CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
            echo "| 🟠 High bloqueantes | $HIGH |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Total bloqueantes** | **$BLOQUEANTES** |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            echo "HIGH/CRITICAL bloqueantes: $BLOQUEANTES"

            if [ "$GATE_STATUS" = "FAIL" ]; then
              echo "❌ Gate falhou — veja a tabela acima" >> "$GITHUB_STEP_SUMMARY"
              echo "❌ Security gate failed"
              exit 1
            fi

            echo "✅ Security gate passed" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ Security gate passed — nenhum HIGH/CRITICAL aberto"

          else
            echo "⚠️ Plataforma indisponível — usando fallback local" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            TRIVY=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' trivy.json)
            SEMGREP=$(jq '[.results[]? | select(.extra.severity=="HIGH" or .extra.severity=="CRITICAL")] | length' semgrep.json)
            CUSTOM=$(jq '[.results[]? | select(.severity=="HIGH" or .severity=="CRITICAL")] | length' custom-review.json)
            TOTAL=$((TRIVY + SEMGREP + CUSTOM))

            if [ "$TRIVY" -gt 0 ]; then
              echo "### 📦 SCA — Vulnerabilidades HIGH/CRITICAL (Trivy — fallback)" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "| Severidade | CVE | Componente | Versão instalada | Versão que corrige |" >> "$GITHUB_STEP_SUMMARY"
              echo "|:---:|---|---|:---:|:---:|" >> "$GITHUB_STEP_SUMMARY"
              jq -r '
                .Results[].Vulnerabilities[]?
                | select(.Severity=="HIGH" or .Severity=="CRITICAL")
                | [(if .Severity=="CRITICAL" then "🔴 CRITICAL" else "🟠 HIGH" end),
                   (.VulnerabilityID // "N/A"), (.PkgName // "N/A"),
                   (.InstalledVersion // "N/A"),
                   (if (.FixedVersion // "") != "" then .FixedVersion else "⚠️ sem fix" end)]
                | "| " + join(" | ") + " |"
              ' trivy.json >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "| Scanner | HIGH/CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|:---:|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Trivy | $TRIVY |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Semgrep | $SEMGREP |" >> "$GITHUB_STEP_SUMMARY"
            echo "| Custom | $CUSTOM |" >> "$GITHUB_STEP_SUMMARY"
            echo "| **Total** | **$TOTAL** |" >> "$GITHUB_STEP_SUMMARY"

            if [ "$TOTAL" -gt 0 ]; then
              echo "❌ Security gate failed — veja a tabela acima" >> "$GITHUB_STEP_SUMMARY"
              echo "❌ Security gate failed (fallback local)"
              exit 1
            fi
            echo "✅ Security gate passed (fallback local)" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ Security gate passed"
          fi
