name: "Security CI (Semgrep + Gitleaks + ESLint)"

on:
  pull_request:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 3 * * *"  # varredura noturna full

# Evita jobs duplicados em PRs atualizados rapidamente
concurrency:
  group: "security-ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  eslint_node:
    if: ${{ hashFiles('package.json') != '' }}
    name: "ESLint (Node/JS/TS)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Instalar dependências"
        run: |
          npm ci || npm i
          npm i -D eslint @eslint/js eslint-plugin-security @microsoft/eslint-plugin-sdl

      - name: "Lint (falhar em qualquer erro de segurança)"
        run: |
          npx eslint . --max-warnings=0

  semgrep:
    name: "Semgrep (Java + Node + PHP) — fail on high/critical"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Instalar Semgrep"
        run: pip install --upgrade semgrep

      - name: "Semgrep no PR (diff-aware)"
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          semgrep ci \
            --config=p/owasp-top-ten \
            --config=p/cwe-top-25 \
            --severity=ERROR \
            --error

      - name: "Semgrep full (main/nightly)"
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/cwe-top-25 \
            --severity=ERROR \
            --error \
            .

  gitleaks:
    name: "Gitleaks (Secrets)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout (histórico completo)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Gitleaks scan"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
