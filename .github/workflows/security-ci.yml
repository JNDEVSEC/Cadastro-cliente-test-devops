name: "Security CI (Semgrep + ESLint + FindSecBugs + DepCheck)"

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: "security-ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  detect_stacks:
    name: "Detectar stacks (Java / Node)"
    runs-on: ubuntu-latest
    outputs:
      has_java: ${{ steps.det.outputs.has_java }}
      has_node: ${{ steps.det.outputs.has_node }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar linguagens
        id: det
        shell: bash
        run: |
          set -euo pipefail
          has_java=false
          has_node=false

          # Detect Java (pom.xml ou Gradle)
          if git ls-files | grep -E '(^|/)(pom\.xml|build\.gradle(\.kts)?)$' -q; then
            has_java=true
          fi
          # Detect Node
          if [ -f package.json ]; then
            has_node=true
          fi

          {
            echo "has_java=$has_java"
            echo "has_node=$has_node"
          } >> "$GITHUB_OUTPUT"

      - name: Exibir detecção
        run: |
          echo "Java: ${{ steps.det.outputs.has_java }}"
          echo "Node: ${{ steps.det.outputs.has_node }}"

  # -----------------------------
  # ESLint (Node)
  # -----------------------------
  eslint_node:
    name: "ESLint (Node/JS/TS)"
    needs: detect_stacks
    if: ${{ needs.detect_stacks.outputs.has_node == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependências
        shell: bash
        run: |
          set -euo pipefail
          npm ci || npm i
          npm i -D eslint @eslint/js eslint-plugin-security @microsoft/eslint-plugin-sdl

      - name: Criar .eslintrc.json mínimo (sem here-doc)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f ".eslintrc.json" ] && [ ! -f "eslint.config.js" ]; then
            printf '%s\n' \
            '{' \
            '  "root": true,' \
            '  "env": { "es2021": true, "node": true },' \
            '  "extends": ["eslint:recommended", "plugin:security/recommended"],' \
            '  "plugins": ["security", "@microsoft/sdl"],' \
            '  "rules": {' \
            '    "security/detect-object-injection": "warn",' \
            '    "@microsoft/sdl/no-insecure-url": "error"' \
            '  }' \
            '}' > .eslintrc.json
          fi

      - name: Rodar ESLint (falhar em warnings)
        run: npx eslint . --max-warnings=0

  # -----------------------------
  # Semgrep (Java + Node)
  # -----------------------------
  semgrep:
    name: "Semgrep — SAST (Java/Node)"
    needs: detect_stacks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Semgrep
        shell: bash
        run: |
          set -euo pipefail
          pip install --upgrade semgrep

      - name: Ignorar arquivos que quebram o Semgrep
        shell: bash
        run: |
          set -euo pipefail
          echo "semgrep.yml" >> .semgrepignore || true

      - name: Preparar regras
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          cfg=( "p/owasp-top-ten" "p/cwe-top-25" "p/secrets" "p/docker" "p/ci" )
          if [ "${{ needs.detect_stacks.outputs.has_java }}" = "true" ]; then
            cfg+=( "p/java" "p/spring" )
          fi
          if [ "${{ needs.detect_stacks.outputs.has_node }}" = "true" ]; then
            cfg+=( "p/javascript" "p/typescript" "p/nodejs" )
          fi
          IFS=, eval 'csv="${cfg[*]}"'
          echo "csv=$csv" >> "$GITHUB_OUTPUT"

      - name: Semgrep (PR)
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -r -a arr <<< "${{ steps.cfg.outputs.csv }}"
          args=(); for c in "${arr[@]}"; do args+=( "--config=$c" ); done
          echo "=== Semgrep version ==="; semgrep --version || true
          semgrep ci "${args[@]}" \
            --timeout 180 --strict --verbose \
            --sarif --output semgrep.sarif \
            --metrics=off --error . \
            1> semgrep_stdout.log \
            2> semgrep_stderr.log || code=$?
          echo "Semgrep exit code: ${code:-0}"
          exit ${code:-0}

      - name: Upload SARIF (PR)
        if: ${{ github.event_name == 'pull_request' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

      - name: Semgrep full scan
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -r -a arr <<< "${{ steps.cfg.outputs.csv }}"
          args=(); for c in "${arr[@]}"; do args+=( "--config=$c" ); done
          echo "=== Semgrep version ==="; semgrep --version || true
          semgrep scan "${args[@]}" \
            --timeout 180 --strict --verbose \
            --sarif --output semgrep.sarif \
            --metrics=off --error . \
            1> semgrep_stdout.log \
            2> semgrep_stderr.log || code=$?
          echo "Semgrep exit code: ${code:-0}"
          exit ${code:-0}

      - name: Upload logs do Semgrep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-logs
          path: |
            semgrep_stdout.log
            semgrep_stderr.log

  # -----------------------------
  # Java: FindSecBugs (SpotBugs)
  # -----------------------------
  findsecbugs:
    name: "FindSecBugs (Java SAST)"
    needs: detect_stacks
    if: ${{ needs.detect_stacks.outputs.has_java == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar diretório do pom.xml
        id: pom
        shell: bash
        run: |
          set -euo pipefail
          P=$(git ls-files | grep "pom.xml" | head -n1 || true)
          if [ -z "$P" ]; then
            echo "Nenhum pom.xml encontrado!"
            exit 1
          fi
          echo "dir=$(dirname "$P")" >> "$GITHUB_OUTPUT"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Rodar SpotBugs + FindSecBugs
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.pom.outputs.dir }}"
          mvn -q -e -DskipTests package
          mvn -q com.github.spotbugs:spotbugs-maven-plugin:4.8.6.2:spotbugs \
            -Dspotbugs.effort=max \
            -Dspotbugs.threshold=Low

      - name: Upload relatórios SpotBugs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: |
            **/target/spotbugsXml.xml
            **/target/spotbugs.html

  # -----------------------------
  # Java: OWASP Dependency-Check
  # -----------------------------
  dependency_check_java:
    name: "OWASP Dependency-Check (Java)"
    needs: detect_stacks
    if: ${{ needs.detect_stacks.outputs.has_java == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar diretório do pom.xml
        id: pom
        shell: bash
        run: |
          set -euo pipefail
          P=$(git ls-files | grep "pom.xml" | head -n1 || true)
          if [ -z "$P" ]; then
            echo "Nenhum pom.xml encontrado!"
            exit 1
          fi
          echo "dir=$(dirname "$P")" >> "$GITHUB_OUTPUT"

      - name: Cache ODC
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: odc-cache

      - name: Rodar Dependency-Check
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.pom.outputs.dir }}"
          mvn -q org.owasp:dependency-check-maven:10.0.3:check \
            -Dformat=ALL \
            -DfailBuildOnCVSS=9.0

      - name: Upload relatórios ODC
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            **/dependency-check-report.html
            **/dependency-check-report.json
            **/dependency-check-report.xml
