name: "Security CI (Trivy + Semgrep + FindSecBugs + ESLint)"

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"  # varredura noturna

concurrency:
  group: "security-ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # necessário para upload SARIF (Semgrep/Trivy)

jobs:
  detect_stacks:
    name: "Detectar stacks (Java / Node)"
    runs-on: ubuntu-latest
    outputs:
      has_java: ${{ steps.det.outputs.has_java }}
      has_node: ${{ steps.det.outputs.has_node }}
      java_pom_dir: ${{ steps.det.outputs.java_pom_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar linguagens
        id: det
        shell: bash
        run: |
          set -euo pipefail
          has_java=false
          has_node=false
          pom_dir=""

          # Java: se existir qualquer pom.xml/gradle
          if git ls-files | grep -E '(^|/)(pom\.xml|build\.gradle(\.kts)?)$' -q; then
            has_java=true
            P=$(git ls-files | grep "pom.xml" | head -n1 || true)
            if [ -n "$P" ]; then pom_dir="$(dirname "$P")"; fi
          fi

          # Node
          if [ -f package.json ]; then
            has_node=true
          fi

          {
            echo "has_java=$has_java"
            echo "has_node=$has_node"
            echo "java_pom_dir=$pom_dir"
          } >> "$GITHUB_OUTPUT"

      - name: Exibir detecção
        run: |
          echo "Java: ${{ steps.det.outputs.has_java }}"
          echo "Node: ${{ steps.det.outputs.has_node }}"
          echo "Pasta do POM: ${{ steps.det.outputs.java_pom_dir }}"

  # -----------------------------
  # ESLint (Node) — apenas relatório (não bloqueia)
  # -----------------------------
  eslint_node:
    name: "ESLint (Node/JS/TS)"
    needs: detect_stacks
    if: ${{ needs.detect_stacks.outputs.has_node == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependências
        shell: bash
        run: |
          set -euo pipefail
          npm ci || npm i
          npm i -D eslint @eslint/js eslint-plugin-security @microsoft/eslint-plugin-sdl

      - name: Criar .eslintrc.json mínimo
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f ".eslintrc.json" ] && [ ! -f "eslint.config.js" ]; then
            printf '%s\n' \
            '{' \
            '  "root": true,' \
            '  "env": { "es2021": true, "node": true },' \
            '  "extends": ["eslint:recommended", "plugin:security/recommended"],' \
            '  "plugins": ["security", "@microsoft/sdl"],' \
            '  "rules": {' \
            '    "security/detect-object-injection": "warn",' \
            '    "@microsoft/sdl/no-insecure-url": "error"' \
            '  }' \
            '}' > .eslintrc.json
          fi

      - name: Rodar ESLint (apenas reportar)
        continue-on-error: true
        run: npx eslint . --max-warnings=0

  # -----------------------------
  # Semgrep (Java + Node) — SAST, sem gate
  # -----------------------------
  semgrep:
    name: "Semgrep — SAST (Java/Node)"
    needs: detect_stacks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Semgrep (pinned)
        shell: bash
        run: |
          set -euo pipefail
          pip install --upgrade "semgrep==1.152.0"

      - name: Ignorar YAMLs problemáticos
        shell: bash
        run: |
          set -euo pipefail
          echo "semgrep.yml" >> .semgrepignore || true

      - name: Preparar regras
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          cfg=( "p/owasp-top-ten" "p/cwe-top-25" "p/secrets" "p/docker" "p/ci" )
          if [ "${{ needs.detect_stacks.outputs.has_java }}" = "true" ]; then
            cfg+=( "p/java" "p/spring" )
          fi
          if [ "${{ needs.detect_stacks.outputs.has_node }}" = "true" ]; then
            cfg+=( "p/javascript" "p/typescript" "p/nodejs" )
          fi
          IFS=, eval 'csv="${cfg[*]}"'
          echo "csv=$csv" >> "$GITHUB_OUTPUT"

      - name: Semgrep (PR — diff aware, sem bloquear)
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -r -a arr <<< "${{ steps.cfg.outputs.csv }}"
          args=(); for c in "${arr[@]}"; do args+=( "--config=$c" ); done
          echo "=== Semgrep version ==="; semgrep --version || true
          # Removido --error para NÃO bloquear por findings
          semgrep ci "${args[@]}" \
            --timeout 300 --strict --verbose \
            --sarif --output semgrep.sarif \
            --metrics=off . \
            1> semgrep_stdout.log \
            2> semgrep_stderr.log || code=$?
          echo "Semgrep exit code (PR): ${code:-0}"
          exit 0

      - name: Upload SARIF (PR)
        if: ${{ github.event_name == 'pull_request' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-pr

      - name: Semgrep full scan (push/schedule, sem bloquear)
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -r -a arr <<< "${{ steps.cfg.outputs.csv }}"
          args=(); for c in "${arr[@]}"; do args+=( "--config=$c" ); done
          echo "=== Semgrep version ==="; semgrep --version || true
          semgrep scan "${args[@]}" \
            --timeout 300 --strict --verbose \
            --sarif --output semgrep.sarif \
            --metrics=off . \
            1> semgrep_stdout.log \
            2> semgrep_stderr.log || code=$?
          echo "Semgrep exit code (full): ${code:-0}"
          exit 0

      # Resumo no console (Top 20) — sempre que houver SARIF
      - name: Semgrep summary (console)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "semgrep.sarif" ]; then
            python - <<'PY'
              import json, sys
              with open('semgrep.sarif','r',encoding='utf-8') as f:
                  sarif=json.load(f)
              runs=sarif.get('runs',[])
              results=(runs[0].get('results',[]) if runs else [])
              def sev_to_order(lvl): return {'error':0,'warning':1,'note':2}.get(lvl,9)
              print("=== Semgrep — Resumo (Top 20) ===")
              print(f"Total de findings: {len(results)}")
              from collections import Counter
              levels=Counter([r.get('level','') for r in results])
              print("Por severidade (SARIF level):", dict(levels))
              print("\nTop 20:")
              for i,r in enumerate(sorted(results,key=lambda x: sev_to_order(x.get('level','')))):
                  if i>=20: break
                  rid=r.get('ruleId','')
                  lvl=r.get('level','')
                  msg=((r.get('message') or {}).get('text') or '').replace('\n',' ')
                  loc=((r.get('locations') or [{}])[0]).get('physicalLocation',{})
                  art=(loc.get('artifactLocation') or {}).get('uri','')
                  reg=(loc.get('region') or {})
                  line=reg.get('startLine','?')
                  print(f"[{i+1:02d}] {lvl.upper():7} {rid:35} @ {art}:{line} — {msg}")
              PY
            else
              echo "semgrep.sarif não encontrado."
            fi

      # HTML sempre: SARIF -> HTML
      - name: Gerar HTML do Semgrep (SARIF → HTML)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "semgrep.sarif" ]; then
            python - <<'PY'
            import json,html
            sarif=json.load(open('semgrep.sarif','r',encoding='utf-8'))
            runs=sarif.get('runs',[])
            results=(runs[0].get('results',[]) if runs else [])
            def esc(x): return html.escape(str(x) if x is not None else "")
            html_head = """<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/>
            <title>Relatório Semgrep (SARIF)</title>
            <style>
            body{font-family:Arial,Helvetica,sans-serif;margin:24px}
            h1{margin:0 0 12px 0} table{border-collapse:collapse;width:100%}
            th,td{border:1px solid #ccc;padding:6px 8px;font-size:14px}
            th{background:#f2f2f2;text-align:left}
            .err{background:#ffe5e5}.warn{background:#fff0e0}.note{background:#eef7ff}
            .badge{display:inline-block;padding:2px 6px;border-radius:4px;background:#444;color:#fff;font-size:12px}
            </style></head><body>"""
            out=[html_head, "<h1>Relatório Semgrep — SARIF</h1>",
                 f"<p>Total de findings: {len(results)}</p>",
                 "<table><thead><tr><th>#</th><th>Nível</th><th>RuleId</th><th>Arquivo</th><th>Linha</th><th>Mensagem</th></tr></thead><tbody>"]
            def css(lvl): return {'error':'err','warning':'warn','note':'note'}.get(lvl,'')
            for i,r in enumerate(results,1):
                lvl=r.get('level','')
                rid=r.get('ruleId','')
                msg=((r.get('message') or {}).get('text') or '')
                loc=((r.get('locations') or [{}])[0]).get('physicalLocation',{})
                art=(loc.get('artifactLocation') or {}).get('uri','')
                line=(loc.get('region') or {}).get('startLine','')
                out.append(f"<tr class='{css(lvl)}'><td>{i}</td><td><span class='badge'>{esc(lvl.upper())}</span></td>"
                           f"<td>{esc(rid)}</td><td>{esc(art)}</td><td>{esc(line)}</td><td>{esc(msg)}</td></tr>")
            out.append("</tbody></table></body></html>")
            open('semgrep-report.html','w',encoding='utf-8').write("".join(out))
            print("HTML gerado: semgrep-report.html")
            PY
          else
            echo "semgrep.sarif não encontrado; HTML não será gerado."
          fi

      - name: Upload relatório HTML do Semgrep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-html-report
          path: semgrep-report.html

      - name: Upload logs do Semgrep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-logs
          path: |
            semgrep_stdout.log
            semgrep_stderr.log

  # -----------------------------
  # FindSecBugs (Java SAST) — apenas relatório
  # -----------------------------
  findsecbugs:
    name: "FindSecBugs (Java — apenas relatório)"
    needs: detect_stacks
    if: ${{ needs.detect_stacks.outputs.has_java == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detectar diretório do POM
        id: pom
        shell: bash
        run: |
          set -euo pipefail
          P=$(git ls-files | grep "pom.xml" | head -n1 || true)
          if [ -z "$P" ]; then echo "Nenhum pom.xml encontrado!"; exit 1; fi
          echo "dir=$(dirname "$P")" >> "$GITHUB_OUTPUT"

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build + SpotBugs/FindSecBugs (gera relatórios)
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.pom.outputs.dir }}"
          mvn -q -e -DskipTests package
          mvn -q spotbugs:spotbugs

      - name: Sumário de vulnerabilidades no console
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ steps.pom.outputs.dir }}"
          XML="target/spotbugsXml.xml"
          if [ -f "$XML" ]; then
            echo "=== SpotBugs (SECURITY) — resumo ==="
            # P1=High, P2=Medium, P3=Low
            awk -F'[=\" ]+' '/<BugInstance/{p[$8]++}END{printf("P1(High): %d | P2(Medium): %d | P3(Low): %d\n",p[1]+0,p[2]+0,p[3]+0)}' "$XML"
            echo "Relatórios completos:"
            echo " - XML : $(pwd)/target/spotbugsXml.xml"
            echo " - HTML: $(pwd)/target/spotbugs.html"
          else
            echo "Nenhum spotbugsXml.xml encontrado."
          fi

      # Removido o gate (spotbugs:check)

      - name: Upload relatórios SpotBugs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: |
            ${{ steps.pom.outputs.dir }}/target/spotbugsXml.xml
            ${{ steps.pom.outputs.dir }}/target/spotbugs.html
          if-no-files-found: warn

  # -----------------------------
  # TRIVY — SCA rápida (repo inteiro) — sem gate
  # -----------------------------
  trivy_sca:
    name: "Trivy — SCA (repo) + Code Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/trivy/db
            ~/.cache/trivy/java-db
          key: cache-trivy-${{ runner.os }}-${{ hashFiles('**/pom.xml', '**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}
          restore-keys: |
            cache-trivy-${{ runner.os }}-

      - name: Trivy FS scan (HIGH/CRITICAL) — SARIF (sem gate)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          scanners: vuln
          ignore-unfixed: true
          exit-code: '0'               # NÃO bloquear
          limit-severities-for-sarif: true
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"

      - name: Trivy summary (table)
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          trivy fs . \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignore-unfixed \
            --format table \
            --skip-db-update \
            --exit-code 0 || true

      - name: Escrever template HTML do Trivy
        shell: bash
        run: |
          set -euo pipefail
          cat > trivy-html.tpl <<'TPL'
          {{- /* Template HTML simples: cabeçalho + tabela por target */ -}}
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8"/>
            <title>Relatório Trivy (FS)</title>
            <style>
              body{font-family:Arial,Helvetica,sans-serif;margin:24px;}
              h1{margin:0 0 12px 0}
              h2{margin:24px 0 8px 0}
              table{border-collapse:collapse;width:100%}
              th,td{border:1px solid #ccc;padding:6px 8px;font-size:14px}
              th{background:#f2f2f2;text-align:left}
              .sev-CRITICAL{background:#ffe5e5}
              .sev-HIGH{background:#fff0e0}
              .sev-MEDIUM{background:#fff9e0}
              .sev-LOW{background:#eef7ff}
            </style>
          </head>
          <body>
            <h1>Relatório Trivy — Filesystem</h1>
            <p>Severidades consideradas: CRITICAL, HIGH (ignore-unfixed={{ .Options.IgnoreUnfixed }})</p>
            {{- range .Results }}
              <h2>Target: {{ .Target }}</h2>
              {{- if .Vulnerabilities }}
              <table>
                <thead>
                  <tr>
                    <th>Pacote</th>
                    <th>Vulnerabilidade</th>
                    <th>Severidade</th>
                    <th>Versão Instalada</th>
                    <th>Versão Corrigida</th>
                    <th>Título</th>
                    <th>Referência</th>
                  </tr>
                </thead>
                <tbody>
                  {{- range .Vulnerabilities }}
                  <tr class="sev-{{ .Severity }}">
                    <td>{{ .PkgName }}</td>
                    <td>{{ .VulnerabilityID }}</td>
                    <td>{{ .Severity }}</td>
                    <td>{{ .InstalledVersion }}</td>
                    <td>{{ .FixedVersion }}</td>
                    <td>{{ .Title }}</td>
                    <td>
                      {{- if .PrimaryURL -}}
                        <a href="{{ .PrimaryURL }}" target="_blank" rel="noopener">link</a>
                      {{- else if .References }}
                        <a href="{{ index .References 0 }}" target="_blank" rel="noopener">link</a>
                      {{- else -}}
                        —
                      {{- end }}
                    </td>
                  </tr>
                  {{- end }}
                </tbody>
              </table>
              {{- else }}
                <p><em>Sem vulnerabilidades reportadas neste alvo.</em></p>
              {{- end }}
            {{- end }}
          </body>
          </html>
          TPL

      - name: Gerar HTML (Trivy template)
        shell: bash
        run: |
          set -euo pipefail
          trivy fs . \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignore-unfixed \
            --format template \
            --template "@trivy-html.tpl" \
            --skip-db-update \
            --exit-code 0 > trivy-report.html

      - name: Upload HTML (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-html-report
          path: trivy-report.html

      - name: Upload SARIF (Trivy)
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-sca
