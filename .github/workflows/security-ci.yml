name: "Security CI (Semgrep + Gitleaks + ESLint)"

on:
  pull_request:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 3 * * *"  # varredura noturna full

# Evita jobs duplicados em PRs atualizados rapidamente
concurrency:
  group: "security-ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # 1) Job de detecção para controlar o ESLint via outputs, sem usar hashFiles em nível de job
  detect_node:
    name: "Detectar Node (package.json)"
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.chk.outputs.has_node }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Checar package.json"
        id: chk
        shell: bash
        run: |
          if [ -f "package.json" ]; then
            echo "has_node=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_node=false" >> "$GITHUB_OUTPUT"
          fi

  # 2) ESLint condicionado ao resultado do detect_node
  eslint_node:
    name: "ESLint (Node/JS/TS)"
    needs: detect_node
    if: ${{ needs.detect_node.outputs.has_node == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: "Instalar dependências"
        run: |
          npm ci || npm i
          # Plugins de segurança (baseline)
          npm i -D eslint @eslint/js eslint-plugin-security @microsoft/eslint-plugin-sdl

      - name: "Lint (falhar em qualquer erro de segurança)"
        run: |
          npx eslint . --max-warnings=0

  # 3) Semgrep — mantém sua lógica (com aspas para evitar parsing issues)
  semgrep:
    name: "Semgrep (Java + Node + PHP) — fail on high/critical"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # melhora diff-aware

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: "Instalar Semgrep"
        run: pip install --upgrade semgrep

      - name: "Semgrep no PR (diff-aware)"
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          semgrep ci \
            --config=p/owasp-top-ten \
            --config=p/cwe-top-25 \
            --severity=ERROR \
            --error

      - name: "Semgrep full scan (main/nightly)"
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/cwe-top-25 \
            --severity=ERROR \
            --error \
            .

  # 4) Gitleaks — idem
  gitleaks:
    name: "Gitleaks (Secrets)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout (histórico completo)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Gitleaks scan"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Para repositórios de ORGANIZAÇÃO, adicione um secret chamado GITLEAKS_LICENSE
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
