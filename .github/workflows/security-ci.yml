name: "Security CI (Semgrep + ESLint + FindSecBugs + DepCheck + PHP)"

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"  # varredura noturna full

concurrency:
  group: "security-ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # necessário para upload SARIF (Semgrep/Code Scanning)

jobs:
  detect_stacks:
    name: "Detectar stacks (Java / Node / PHP)"
    runs-on: ubuntu-latest
    outputs:
      has_java: ${{ steps.det.outputs.has_java }}
      has_node: ${{ steps.det.outputs.has_node }}
      has_php:  ${{ steps.det.outputs.has_php }}
    steps:
      - name: Checkout
      # traz apenas o código (sem submódulos)
        uses: actions/checkout@v4

      - name: Detectar linguagens
        id: det
        shell: bash
        run: |
          set -euo pipefail
          has_java=false
          has_node=false
          has_php=false

          # Detecta arquivos rastreados pelo git (mais confiável que ** glob)
          if git ls-files | grep -E '(^|/)(pom\.xml|build\.gradle(\.kts)?)$' -q; then
            has_java=true
          fi
          if [ -f "package.json" ]; then
            has_node=true
          fi
          if [ -f "composer.json" ] || git ls-files '*.php' | head -n1 >/dev/null; then
            has_php=true
          fi

          {
            echo "has_java=$has_java"
            echo "has_node=$has_node"
            echo "has_php=$has_php"
          } >> "$GITHUB_OUTPUT"

      - name: Exibir detecção
        run: |
          echo "Java: ${{ steps.det.outputs.has_java }}"
          echo "Node: ${{ steps.det.outputs.has_node }}"
          echo "PHP : ${{ steps.det.outputs.has_php }}"

  # -----------------------------
  # Node: ESLint com regras de segurança
  # -----------------------------
  eslint_node:
    name: "ESLint (Node/JS/TS) com regras de segurança"
    needs: detect_stacks
    if: ${{ needs.detect_stacks.outputs.has_node == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências e plugins
        shell: bash
        run: |
          set -euo pipefail
          npm ci || npm i
          npm i -D eslint @eslint/js eslint-plugin-security @microsoft/eslint-plugin-sdl

      - name: Criar .eslintrc.json (mínimo) se não existir
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f ".eslintrc.json" ] && [ ! -f "eslint.config.js" ]; then
            cat > .eslintrc.json << 'EOF'
            {
              "root": true,
              "env": { "es2021": true, "node": true, "browser": false },
              "extends": ["eslint:recommended", "plugin:security/recommended"],
              "plugins": ["security", "@microsoft/sdl"],
              "rules": {
                "security/detect-object-injection": "warn",
                "security/detect-non-literal-regexp": "warn",
                "@microsoft/sdl/no-insecure-url": "error",
                "@microsoft/sdl/no-polyglot-injection": "warn"
              }
            }
            EOF
          fi

      - name: Lint (falhar em erros)
        shell: bash
        run: |
          set -euo pipefail
          npx eslint . --max-warnings=0

      # Opcional: audit de dependências Node
      - name: npm audit (alto/crítico)
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          npm audit --audit-level=high || true

      - name: Publicar relatório npm audit
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          npm audit --json > npm-audit.json || true

      - name: Upload npm audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit
          path: npm-audit.json

  # -----------------------------
  # Semgrep (condicional por linguagens) — Java/Node/PHP
  # -----------------------------
  semgrep:
    name: "Semgrep — regras por linguagem (Java/Node/PHP) + CI/Secrets/Docker"
    needs: detect_stacks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Semgrep
        shell: bash
        run: |
          set -euo pipefail
          pip install --upgrade semgrep

      - name: Preparar lista de configs por stack
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          configs=( "p/owasp-top-ten" "p/cwe-top-25" "p/secrets" "p/docker" "p/ci" )
          if [ "${{ needs.detect_stacks.outputs.has_java }}" = "true" ]; then
            configs+=( "p/java" "p/spring" )
          fi
          if [ "${{ needs.detect_stacks.outputs.has_node }}" = "true" ]; then
            configs+=( "p/javascript" "p/typescript" "p/nodejs" )
          fi
          if [ "${{ needs.detect_stacks.outputs.has_php }}" = "true" ]; then
            configs+=( "p/php" )
          fi
          IFS=, eval 'csv="${configs[*]}"'
          echo "configs_csv=$csv" >> "$GITHUB_OUTPUT"

      # Ignora YAML que causou parse error (evita exit 2 com --strict)
      - name: Ignorar arquivos problemáticos no Semgrep
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "semgrep.yml"
          } >> .semgrepignore

      - name: Semgrep no PR (diff-aware)
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Semgrep version ==="
          semgrep --version || true
          IFS=',' read -r -a arr <<< "${{ steps.cfg.outputs.configs_csv }}"
          args=(); for c in "${arr[@]}"; do args+=( "--config=$c" ); done
          semgrep ci "${args[@]}" \
            --timeout 180 \
            --strict \
            --verbose \
            --sarif --output semgrep.sarif \
            --metrics=off \
            --error \
            . \
            1> semgrep_stdout.log \
            2> semgrep_stderr.log || code=$?
          code=${code:-0}
          echo "Semgrep exit code: $code"
          if [ "$code" -eq 2 ]; then
            echo "---- semgrep_stderr.log (tail) ----"
            tail -n 120 semgrep_stderr.log || true
          fi
          exit "$code"

      - name: Upload SARIF (PR)
        if: ${{ github.event_name == 'pull_request' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep-pr

      - name: Semgrep full scan (push/schedule)
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -r -a arr <<< "${{ steps.cfg.outputs.configs_csv }}"
          args=(); for c in "${arr[@]}"; do args+=( "--config=$c" ); done
          semgrep scan "${args[@]}" \
            --timeout 180 \
            --strict \
            --verbose \
            --sarif --output semgrep.sarif \
            --metrics=off \
            --error \
            . \
            1> semgrep_stdout.log \
            2> semgrep_stderr.log || code=$?
          code=${code:-0}
          echo "Semgrep exit code: $code"
          if [ "$code" -eq 2 ]; then
            echo "---- semgrep_stderr.log (tail) ----"
            tail -n 120 semgrep_stderr.log || true
          fi
          exit "$code"

      - name: Upload SARIF (full)
        if: ${{ github.event_name != 'pull_request' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep-full

      - name: Upload logs do Semgrep
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-logs
          path: |
            semgrep_stdout.log
            semgrep_stderr.log

  # -----------------------------
  # Gitleaks (segredos) — SEM customização (v2 via env)
  # -----------------------------
  gitleaks:
    name: "Gitleaks (segredos)"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # permite comentar em PRs, quando aplicável
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks v2 (config padrão, org requer licença)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Obrigatório para repositório de ORGANIZAÇÃO (adicione em Settings → Secrets):
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_SUMMARY: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
        # A v2 oficial usa apenas variáveis de ambiente (não usar `with:/args`). cite: gitleaks action v2 README

  # -----------------------------
  # Java: FindSecBugs (SpotBugs)
  # -----------------------------
  findsecbugs:
    name: "FindSecBugs (Java SAST)"
    needs: detect_stacks
    if: ${{ needs.detect_stacks.outputs.has_java == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-
      - name: Build com SpotBugs + FindSecBugs
        shell: bash
        run: |
          set -euo pipefail
          mvn -q -e -DskipTests package
          mvn -q com.github.spotbugs:spotbugs-maven-plugin:4.8.6.2:spotbugs \
            -Dspotbugs.effort=max -Dspotbugs.threshold=Low
      - name: Publicar relatório SpotBugs (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: |
            **/target/spotbugsXml.xml
            **/target/spotbugs.html

  # -----------------------------
  # Java: OWASP Dependency-Check
  # -----------------------------
  dependency_check_java:
    name: "OWASP Dependency-Check (Java)"
    needs: detect_stacks
    if: ${{ needs.detect_stacks.outputs.has_java == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache ODC
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: odc-cache
      - name: Executar ODC (Maven)
        shell: bash
        run: |
          set -euo pipefail
          mvn -q org.owasp:dependency-check-maven:10.0.3:check \
            -Dformat=ALL -DfailBuildOnCVSS=9.0
      - name: Publicar relatórios ODC
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            **/dependency-check-report.html
            **/dependency-check-report.json
            **/dependency-check-report.xml

  # -----------------------------
  # PHP: Lint/SAST (PHPCS + psecio/insight) e Composer Audit
  # -----------------------------
  php_security:
    name: "PHP Security (PHPCS + psecio/insight + Composer Audit)"
    needs: detect_stacks
    if: ${{ needs.detect_stacks.outputs.has_php == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json, xml
          tools: composer, php-cs-fixer, phpcs
          coverage: none

      - name: Instalar dependências Composer (se existir)
        if: ${{ hashFiles('**/composer.json') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          composer install --no-interaction --no-progress --no-scripts

      - name: Instalar psecio/insight (security rules)
        shell: bash
        run: |
          set -euo pipefail
          composer global require --no-interaction --no-progress psecio/insight

      - name: Rodar Insight (PHPCS security) - saída no log
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          ~/.composer/vendor/bin/insight -n . || true

      - name: Composer audit (dependências)
        if: ${{ hashFiles('**/composer.lock') != '' }}
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          composer audit --format=json || true

      - name: Exportar apontadores de relatório
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "Consulte logs do job para saídas do Insight/PHPCS e composer audit." > php-security.txt

      - name: Upload artifacts PHP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-security
          path: php-security.txt
        with:
          name: php-security
          path: php-security.txt
